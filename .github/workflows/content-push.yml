name: Reusable Content Push

on:
  workflow_call:
    inputs:
      repo_slug:
        description: "owner/repo used in the git remote URL on the server"
        required: true
        type: string
      branch:
        description: "Branch to sync (server -> git)"
        required: false
        type: string
        default: "production"
      remote_path:
        required: false
        type: string
        default: "/html/production"
      runs_on:
        required: false
        type: string
        default: "self-hosted"
      run_composer:
        required: false
        type: boolean
        default: true
      run_npm_build:
        required: false
        type: boolean
        default: true
      run_npm_production:
        required: false
        type: boolean
        default: false
      commit_message:
        required: false
        type: string
        default: "chore(content): sync from server [skip ci]"
    secrets:
      SSH_USER:               { required: true }
      SSH_PASS:               { required: true }
      PROD_SERVER:            { required: true }
      DEPLOY_APP_ID:          { required: true }
      DEPLOY_APP_PRIVATE_KEY: { required: true }
      SLACK_WEBHOOK_URL:      { required: true }

jobs:
  push:
    runs-on: ${{ inputs.runs_on }}
    env:
      ENV_NAME: Production

    steps:
      - name: Set start time
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - name: Mint GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Push server content to Git, then redeploy
        env:
          SSH_USER:       ${{ secrets.SSH_USER }}
          SSH_PASS:       ${{ secrets.SSH_PASS }}
          PROD_SERVER:    ${{ secrets.PROD_SERVER }}
          REPO_SLUG:      ${{ inputs.repo_slug }}
          BRANCH:         ${{ inputs.branch }}
          REMOTE_PATH:    ${{ inputs.remote_path }}
          APP_TOKEN:      ${{ steps.app_token.outputs.token }}
          APP_ID:         ${{ secrets.DEPLOY_APP_ID }}
          APP_SLUG:       ${{ steps.app_token.outputs.app-slug }}
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
          DO_COMPOSER:    ${{ inputs.run_composer }}
          DO_NPM:         ${{ inputs.run_npm_build }}
          DO_NPM_PROD:    ${{ inputs.run_npm_production }}
        run: |
          set -euo pipefail

          # Build the remote script. The 'REMOTE' tag is quoted so NOTHING
          # is expanded locally — the remote shell will expand the variables
          # we export at the top of the script.
          REMOTE_SCRIPT=$(cat <<'REMOTE'
          set -xe
          cd "$REMOTE_PATH"
          git checkout "$BRANCH"
          git remote set-url origin \
            "https://x-access-token:${APP_TOKEN}@github.com/${REPO_SLUG}.git"

          # Stage any server-side changes first so they aren't lost
          git add -A
          if ! git diff --cached --quiet; then
            git -c user.name="${APP_SLUG}[bot]" \
                -c user.email="${APP_ID}+${APP_SLUG}[bot]@users.noreply.github.com" \
                commit -m "$COMMIT_MESSAGE"
          fi

          # Reconcile with remote; server changes win on conflict
          git pull --rebase -X ours origin "$BRANCH" || true
          git push origin "$BRANCH"

          if [ "$DO_COMPOSER" = "true" ]; then
            composer install --no-interaction
          fi
          if [ "$DO_NPM" = "true" ]; then
            npm install
            npm run build
          fi
          if [ "$DO_NPM_PROD" = "true" ]; then
            npm install
            npm run production
          fi
          REMOTE
          )

          # Build the preamble that exports each variable on the remote side.
          # printf %q produces a shell-safe single-quoted form, so values with
          # spaces, parentheses, etc. survive intact.
          PREAMBLE=$(printf 'export %s=%q\n' \
            REPO_SLUG       "$REPO_SLUG" \
            APP_TOKEN       "$APP_TOKEN" \
            APP_ID          "$APP_ID" \
            APP_SLUG        "$APP_SLUG" \
            BRANCH          "$BRANCH" \
            REMOTE_PATH     "$REMOTE_PATH" \
            COMMIT_MESSAGE  "$COMMIT_MESSAGE" \
            DO_COMPOSER     "$DO_COMPOSER" \
            DO_NPM          "$DO_NPM" \
            DO_NPM_PROD     "$DO_NPM_PROD")

          # Pipe the assembled script to the remote bash via stdin.
          printf '%s\n%s\n' "$PREAMBLE" "$REMOTE_SCRIPT" \
            | sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no \
                "$SSH_USER@$PROD_SERVER" 'bash -s'

      - name: Compute duration
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          M=$((DURATION / 60)); S=$((DURATION % 60))
          if [ "$M" -gt 0 ]; then
            echo "TOOK=${M}m ${S}s" >> "$GITHUB_ENV"
          else
            echo "TOOK=${S}s" >> "$GITHUB_ENV"
          fi

      - name: Slack Notify on Success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,message,commit,author,action,eventName,ref,workflow
          custom_payload: |
            {
              "attachments": [{
                "color": "#2eb886",
                "title": ":arrows_counterclockwise: Content push to ${{ env.ENV_NAME }} Succeeded",
                "text": "✅ *${{ github.repository }}* synced from server on *${{ inputs.branch }}*\n⏱ Took: *${{ env.TOOK }}*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>",
                "footer": "GitHub Actions • Content Bot"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack Notify on Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,message,commit,author,action,eventName,ref,workflow
          custom_payload: |
            {
              "attachments": [{
                "color": "danger",
                "title": ":x: Content Push to ${{ env.ENV_NAME }} Failed",
                "text": "❌ *${{ github.repository }}* content push failed on *${{ inputs.branch }}*\n⏱ Took: *${{ env.TOOK }}*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>",
                "footer": "GitHub Actions • Content Bot"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
