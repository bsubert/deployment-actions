name: Reusable Content Push

on:
  workflow_call:
    inputs:
      repo_slug:
        required: true
        type: string
      branch:
        description: "Branch to sync (server -> git)"
        required: false
        type: string
        default: "production"
      remote_path:
        required: false
        type: string
        default: "/html/production"
      runs_on:
        required: false
        type: string
        default: "self-hosted"
      run_composer:
        required: false
        type: boolean
        default: true
      run_npm_build:
        required: false
        type: boolean
        default: true
    secrets:
      SSH_USER:          { required: true }
      SSH_PASS:          { required: true }
      PROD_SERVER:       { required: true }
      GIT_USER:          { required: true }
      GIT_TOKEN:         { required: true }
      SLACK_WEBHOOK_URL: { required: true }

jobs:
  push:
    runs-on: ${{ inputs.runs_on }}
    env:
      SSH_USER:    ${{ secrets.SSH_USER }}
      SSH_PASS:    ${{ secrets.SSH_PASS }}
      PROD_SERVER: ${{ secrets.PROD_SERVER }}
      GIT_USER:    ${{ secrets.GIT_USER }}
      GIT_TOKEN:   ${{ secrets.GIT_TOKEN }}
      REPO_SLUG:   ${{ inputs.repo_slug }}
      BRANCH:      ${{ inputs.branch }}
      REMOTE_PATH: ${{ inputs.remote_path }}
      DO_COMPOSER: ${{ inputs.run_composer }}
      DO_NPM:      ${{ inputs.run_npm_build }}
      ENV_NAME:    Production

    steps:
      - name: Set start time
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - name: Push server content to Git, then redeploy
        run: |
          set -euo pipefail
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no \
            "$SSH_USER@$PROD_SERVER" \
            REPO_SLUG="$REPO_SLUG" GIT_USER="$GIT_USER" GIT_TOKEN="$GIT_TOKEN" \
            BRANCH="$BRANCH" REMOTE_PATH="$REMOTE_PATH" \
            DO_COMPOSER="$DO_COMPOSER" DO_NPM="$DO_NPM" \
            'bash -s' <<'REMOTE'
              set -xe
              cd "$REMOTE_PATH"
              git checkout "$BRANCH"
              git remote set-url origin \
                "https://x-access-token:${APP_TOKEN}@github.com/${REPO_SLUG}.git"

              # Stage any server-side changes first so they aren't lost
              git add -A
              if ! git diff --cached --quiet; then
                git -c user.email="actions@github.com" \
                    -c user.name="Content Push Bot" \
                    commit -m "chore(content): sync from server [skip ci]"
              fi

              # Reconcile with remote (server changes win on conflict)
              git pull --rebase -X ours origin "$BRANCH" || true
              git push origin "$BRANCH"

              [ "$DO_COMPOSER" = "true" ] && composer install --no-interaction
              if [ "$DO_NPM" = "true" ]; then
                npm install
                npm run build
              fi
          REMOTE

      - name: Compute duration
        if: always()
        run: |
          END_TIME=$(date +%s); DURATION=$((END_TIME - START_TIME))
          M=$((DURATION / 60)); S=$((DURATION % 60))
          [ "$M" -gt 0 ] && TOOK="${M}m ${S}s" || TOOK="${S}s"
          echo "TOOK=$TOOK" >> "$GITHUB_ENV"

      - name: Slack Notify on Success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,message,commit,author,action,eventName,ref,workflow
          custom_payload: |
            {
              "attachments": [{
                "color": "#2eb886",
                "title": ":arrows_counterclockwise: Content push to ${{ env.ENV_NAME }} Succeeded",
                "text": "✅ *${{ github.repository }}* synced from server on *${{ env.BRANCH }}*\n⏱ Took: *${{ env.TOOK }}*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>",
                "footer": "GitHub Actions • Content Bot"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack Notify on Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,message,commit,author,action,eventName,ref,workflow
          custom_payload: |
            {
              "attachments": [{
                "color": "danger",
                "title": ":x: Content Push to ${{ env.ENV_NAME }} Failed",
                "text": "❌ *${{ github.repository }}* content push failed on *${{ env.BRANCH }}*\n⏱ Took: *${{ env.TOOK }}*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>",
                "footer": "GitHub Actions • Content Bot"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
