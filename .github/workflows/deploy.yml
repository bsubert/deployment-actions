name: Reusable Deploy

on:
  workflow_call:
    inputs:
      repo_slug:
        description: "owner/repo used in the remote URL on the server"
        required: true
        type: string
      prod_path:
        description: "Absolute path on the prod server"
        required: false
        type: string
        default: "/html/production"
      stage_path:
        required: false
        type: string
        default: "/html/staging"
      dev_path:
        required: false
        type: string
        default: "/html/dev"
      runs_on:
        required: false
        type: string
        default: "self-hosted"
      run_composer:
        required: false
        type: boolean
        default: true
      run_npm_build:
        required: false
        type: boolean
        default: true
    secrets:
      SSH_USER:          { required: true }
      SSH_PASS:          { required: true }
      PROD_SERVER:       { required: false }
      STAGE_SERVER:      { required: false }
      DEV_SERVER:        { required: false }
      GIT_USER:          { required: true }
      GIT_TOKEN:         { required: true }
      SLACK_WEBHOOK_URL: { required: true }

jobs:
  deploy:
    runs-on: ${{ inputs.runs_on }}
    env:
      SSH_USER:    ${{ secrets.SSH_USER }}
      SSH_PASS:    ${{ secrets.SSH_PASS }}
      PROD_SERVER: ${{ secrets.PROD_SERVER }}
      STAGE_SERVER: ${{ secrets.STAGE_SERVER }}
      DEV_SERVER:  ${{ secrets.DEV_SERVER }}
      GIT_USER:    ${{ secrets.GIT_USER }}
      GIT_TOKEN:   ${{ secrets.GIT_TOKEN }}
      REPO_SLUG:   ${{ inputs.repo_slug }}
      PROD_PATH:   ${{ inputs.prod_path }}
      STAGE_PATH:  ${{ inputs.stage_path }}
      DEV_PATH:    ${{ inputs.dev_path }}
      DO_COMPOSER: ${{ inputs.run_composer }}
      DO_NPM:      ${{ inputs.run_npm_build }}

    steps:
      - name: Set start time
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - name: Resolve target
        id: target
        run: |
          BRANCH="${GITHUB_REF##*/}"
          case "$BRANCH" in
            production) echo "server=$PROD_SERVER"  >> "$GITHUB_OUTPUT"
                        echo "path=$PROD_PATH"     >> "$GITHUB_OUTPUT"
                        echo "env_name=Production" >> "$GITHUB_ENV" ;;
            staging)    echo "server=$STAGE_SERVER" >> "$GITHUB_OUTPUT"
                        echo "path=$STAGE_PATH"    >> "$GITHUB_OUTPUT"
                        echo "env_name=Staging"    >> "$GITHUB_ENV" ;;
            dev)        echo "server=$DEV_SERVER"  >> "$GITHUB_OUTPUT"
                        echo "path=$DEV_PATH"      >> "$GITHUB_OUTPUT"
                        echo "env_name=Development" >> "$GITHUB_ENV" ;;
            *) echo "Branch $BRANCH not deployable"; exit 0 ;;
          esac
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        env:
          TARGET_SERVER: ${{ steps.target.outputs.server }}
          TARGET_PATH:   ${{ steps.target.outputs.path }}
          BRANCH:        ${{ steps.target.outputs.branch }}
        run: |
          set -euo pipefail
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no \
            "$SSH_USER@$TARGET_SERVER" \
            REPO_SLUG="$REPO_SLUG" GIT_USER="$GIT_USER" GIT_TOKEN="$GIT_TOKEN" \
            BRANCH="$BRANCH" TARGET_PATH="$TARGET_PATH" \
            DO_COMPOSER="$DO_COMPOSER" DO_NPM="$DO_NPM" \
            'bash -s' <<'REMOTE'
              set -xe
              cd "$TARGET_PATH"
              git checkout "$BRANCH"
              git remote set-url origin \
                "https://x-access-token:${APP_TOKEN}@github.com/${REPO_SLUG}.git"
              git pull origin "$BRANCH" --rebase --autostash
              [ "$DO_COMPOSER" = "true" ] && composer install --no-interaction
              if [ "$DO_NPM" = "true" ]; then
                npm install
                npm run build
              fi
          REMOTE

      - name: Compute duration
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          M=$((DURATION / 60)); S=$((DURATION % 60))
          [ "$M" -gt 0 ] && TOOK="${M}m ${S}s" || TOOK="${S}s"
          echo "TOOK=$TOOK" >> "$GITHUB_ENV"

      - name: Slack Notify on Success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,message,commit,author,action,eventName,ref,workflow
          custom_payload: |
            {
              "attachments": [{
                "color": "#2eb886",
                "title": ":rocket: Deployment to ${{ env.env_name }} Succeeded",
                "text": "âś… *${{ github.repository }}* deployed from *${{ github.ref_name }}*\nCommit: `${{ github.sha }}`\nActor: `${{ github.actor }}`\nâŹ± Took: *${{ env.TOOK }}*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>",
                "footer": "GitHub Actions â€˘ Deployment Bot"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack Notify on Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,message,commit,author,action,eventName,ref,workflow
          custom_payload: |
            {
              "attachments": [{
                "color": "danger",
                "title": ":x: Deployment to ${{ env.env_name }} Failed",
                "text": "âťŚ *${{ github.repository }}* failed deploying from *${{ github.ref_name }}*\nCommit: `${{ github.sha }}`\nActor: `${{ github.actor }}`\nâŹ± Took: *${{ env.TOOK }}*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>",
                "footer": "GitHub Actions â€˘ Deployment Bot"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
